services:
  backend:
    image: ghcr.io/raidanmark/rose:dev
    container_name: rose-dev-backend
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/rose_dev
      SPRING_DATASOURCE_USERNAME: rose_user
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION_MINUTES: 15
      JWT_REFRESH_TOKEN_EXPIRATION_DAYS: 30
    depends_on:
      - postgres
    restart: always

  postgres:
    image: postgres:17
    container_name: rose-dev-postgres
    environment:
      POSTGRES_DB: rose_dev
      POSTGRES_USER: rose_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - rose_dev_postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  rose_dev_postgres_data: