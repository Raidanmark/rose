services:
  postgres:
    image: postgres:17
    container_name: rose_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
        - "5433:5432"
    volumes:
      - rose_postgres_data:/var/lib/postgresql/data

volumes:
  rose_postgres_data: